[build]
builder = "DOCKERFILE"
dockerfilePath = "backend/Dockerfile"
buildCommand = "pip install -r requirements.txt"

[deploy]
startCommand = "python manage.py migrate --noinput && uvicorn terra_domini.asgi:application --host 0.0.0.0 --port $PORT"
healthcheckPath = "/health/"
healthcheckTimeout = 60
restartPolicyType = "ON_FAILURE"

[environments.production]
variables = { DJANGO_SETTINGS_MODULE = "terra_domini.settings.base" }
